title: Volts
description: "Vehicle orchestration: Lights, Tunes & Skins — Community-curated light shows, lock sounds, boombox tracks, wraps, and horn sounds for Tesla vehicles."
baseurl: "/Volts"
url: "https://natobytes.com"

# Social / SEO metadata. `url` (host) + `baseurl` (/Volts) give absolute URLs
# for jekyll-seo-tag, jekyll-sitemap, and the OpenGraph/Twitter-card meta in
# _layouts/default.html. Note: the app still resolves catalog downloadUrls
# against the host only — baseurl is unchanged.
author: NatoBytes
twitter:
  card: summary_large_image
social:
  name: Volts
  links:
    - https://github.com/natobytes/Volts

markdown: kramdown

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - node_modules
  - scripts
  - public
  - package.json
  - package-lock.json
  - tsconfig.json
  - Gemfile
  - Gemfile.lock
  - dist
  - "*.ts"
  - README.md

defaults:
  - scope:
      path: ""
      type: "lightshows"
    values:
      layout: "item"
  - scope:
      path: ""
      type: "locksounds"
    values:
      layout: "item"
  - scope:
      path: ""
      type: "boombox"
    values:
      layout: "item"
  - scope:
      path: ""
      type: "wraps"
    values:
      layout: "item"
  - scope:
      path: ""
      type: "hornsounds"
    values:
      layout: "item"

collections_dir: content

collections:
  lightshows:
    output: true
    permalink: /lightshows/:name/
  locksounds:
    output: true
    permalink: /locksounds/:name/
  boombox:
    output: true
    permalink: /boombox/:name/
  wraps:
    output: true
    permalink: /wraps/:name/
  hornsounds:
    output: true
    permalink: /hornsounds/:name/
