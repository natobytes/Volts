name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - name: Setup Ruby via Homebrew
        run: |
          echo "$(brew --prefix ruby)/bin" >> $GITHUB_PATH
          export PATH="$(brew --prefix ruby)/bin:$PATH"
          GEM_DIR="$(ruby -e 'puts Gem.user_dir')/bin"
          echo "$GEM_DIR" >> $GITHUB_PATH

      - name: Install Jekyll dependencies
        run: |
          export PATH="$(brew --prefix ruby)/bin:$(ruby -e 'puts Gem.user_dir')/bin:$PATH"
          gem install bundler --user-install --no-document
          bundle install

      - name: Build Jekyll site
        run: |
          export PATH="$(brew --prefix ruby)/bin:$(ruby -e 'puts Gem.user_dir')/bin:$PATH"
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Copy JSON catalog into site output
        run: cp -r public/api _site/api

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
