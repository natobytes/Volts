name: Validate Locksounds Content

on:
  pull_request:
    branches: [main]
    paths:
      - 'content/_locksounds/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run validate -- --collection locksounds
