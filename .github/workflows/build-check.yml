name: Build Check

# Catches breakage in the JSON build or the Jekyll site on PRs, before it can
# only surface on the production deploy (which would otherwise keep serving the
# last good Pages artifact while main is broken).

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Surface high/critical dependency vulnerabilities on every PR.
      # Non-blocking (|| true) so a fresh advisory can't wall off content PRs,
      # but the report stays visible in the job log for maintainers to triage.
      - name: Audit npm dependencies (high+)
        run: npm audit --audit-level=high || true

      - run: npm run build

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.9'
          bundler-cache: true

      - name: Build Jekyll site (no deploy)
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
