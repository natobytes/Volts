<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  {% seo %}
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f8f9fa;
      --color-surface: #ffffff;
      --color-text: #1a1a2e;
      --color-muted: #6c757d;
      --color-accent: #3b82f6;
      --color-accent-hover: #2563eb;
      --color-border: #e2e8f0;
      --color-tag-bg: #e8f0fe;
      --color-tag-text: #1e40af;
      --color-card-shadow: rgba(0,0,0,0.08);
      --max-width: 960px;
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --radius: 6px;
    }

    [data-theme="dark"] {
      --color-bg: #121218;
      --color-surface: #1e1e2a;
      --color-text: #e4e4ed;
      --color-muted: #9ca3af;
      --color-accent: #60a5fa;
      --color-accent-hover: #93c5fd;
      --color-border: #2d2d3d;
      --color-tag-bg: #1e2a4a;
      --color-tag-text: #93c5fd;
      --color-card-shadow: rgba(0,0,0,0.25);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--color-accent); text-decoration: none; }
    a:hover { color: var(--color-accent-hover); text-decoration: underline; }

    .site-header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-md) var(--space-lg);
    }

    .site-header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-md);
    }

    .site-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      text-decoration: none;
    }
    .site-title:hover { color: var(--color-accent); text-decoration: none; }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm) var(--space-md);
      list-style: none;
    }

    .site-nav a {
      font-size: 0.9rem;
      color: var(--color-muted);
      transition: color 0.15s;
    }
    .site-nav a:hover,
    .site-nav a.active { color: var(--color-accent); text-decoration: none; }

    main {
      flex: 1;
      max-width: var(--max-width);
      margin: var(--space-xl) auto;
      padding: 0 var(--space-lg);
      width: 100%;
    }

    h1 { font-size: 1.75rem; margin-bottom: var(--space-md); }
    h2 { font-size: 1.35rem; margin-bottom: var(--space-sm); }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-lg);
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 2px 8px var(--color-card-shadow); }

    .card-thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .card-placeholder {
      width: 100%;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-border);
      font-size: 2.5rem;
      color: var(--color-muted);
    }

    .card-body {
      padding: var(--space-lg);
    }

    .card h3 { font-size: 1.1rem; margin-bottom: var(--space-xs); }
    .card p { font-size: 0.9rem; color: var(--color-muted); margin-bottom: var(--space-sm); }

    .tag-list { display: flex; flex-wrap: wrap; gap: var(--space-xs); }

    .tag {
      display: inline-block;
      background: var(--color-tag-bg);
      color: var(--color-tag-text);
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      text-decoration: none;
    }
    .tag:hover { background: var(--color-accent); color: #fff; text-decoration: none; }

    .item-meta { color: var(--color-muted); font-size: 0.9rem; margin-bottom: var(--space-md); }
    .item-meta span + span::before { content: " \00b7 "; }

    .breadcrumb {
      font-size: 0.85rem;
      color: var(--color-muted);
      margin-bottom: var(--space-md);
    }
    .breadcrumb a { color: var(--color-muted); }
    .breadcrumb a:hover { color: var(--color-accent); }

    .item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .item-list li {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-md) var(--space-lg);
    }

    .item-list li .item-title { font-weight: 600; }
    .item-list li .item-desc { font-size: 0.9rem; color: var(--color-muted); }

    .category-section { margin-bottom: var(--space-xl); }

    .site-footer {
      border-top: 1px solid var(--color-border);
      padding: var(--space-lg);
      text-align: center;
      font-size: 0.85rem;
      color: var(--color-muted);
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      color: var(--color-muted);
      cursor: pointer;
      padding: 0.3rem 0.5rem;
      font-size: 1.1rem;
      line-height: 1;
      margin-left: auto;
      transition: color 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover {
      color: var(--color-accent);
      border-color: var(--color-accent);
    }

    @media (max-width: 600px) {
      .site-header-inner { flex-direction: column; align-items: flex-start; }
      main { padding: 0 var(--space-md); margin: var(--space-lg) auto; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a>
      {% include nav.html %}
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="theme-toggle-icon"></span>
      </button>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>Made with ❤️ by NatoBytes</p>
  </footer>
  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      var icon = btn.querySelector('.theme-toggle-icon');

      function getTheme() {
        return document.documentElement.getAttribute('data-theme') || 'light';
      }

      function updateIcon() {
        icon.textContent = getTheme() === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
      }

      updateIcon();

      btn.addEventListener('click', function() {
        var next = getTheme() === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon();
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          var theme = e.matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          updateIcon();
        }
      });
    })();
  </script>
</body>
</html>
