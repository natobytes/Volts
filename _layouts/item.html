---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  <p>{{ page.description }}</p>

  {% if page.author %}
    <p><strong>Author:</strong> {{ page.author }}</p>
  {% endif %}

  {% if page.tags %}
    <p><strong>Tags:</strong>
      {% for tag in page.tags %}
        <span>{{ tag }}</span>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </p>
  {% endif %}

  {{ content }}
</article>
